<svg viewBox="0 0 1302 1258" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,Segoe UI,sans-serif">
  <title>Fourth Meridian Data Flow Lifecycle</title>
  <desc>ProviderCatalog is the platform-owned, user-facing institution picker that routes the user's choice to one of four provider shapes (aggregator, exchange, brokerage, import), which fan into one Provider Adapter Layer. That layer normalizes to a canonical DTO and writes Connection plus DiscoveredAccount (gated by user approval), then FinancialAccount and Transaction, fanning out into MerchantSpendingSummary, SpaceSnapshot, the AI Context Builder (with its hard exclusions annotated) producing AiAdvice, and PublishedAccountView rendering to a Public Space.</desc>
  <defs>
    <marker id="arrow-bold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4A4944"/>
    </marker>
    <marker id="arrow-thin" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9C9A92"/>
    </marker>
    <marker id="arrow-deny" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A32D2D"/>
    </marker>
    </defs>
  <rect x="0" y="0" width="1302" height="1258" fill="#FBFAF8"/>
  <text x="50.0" y="40.0" font-size="19" font-weight="700" text-anchor="start" fill="#23231F" font-family="-apple-system,Segoe UI,sans-serif"  style="">Fourth Meridian — Data Flow Lifecycle</text>
  <text x="50.0" y="64.0" font-size="11.5" font-weight="400" text-anchor="start" fill="#73726C" font-family="-apple-system,Segoe UI,sans-serif"  style="">Provider sources fan into one Adapter Layer, then canonical data is computed once and gated by context (trusted Space, public Space, or AI) before reaching a consumer.</text>
