<svg viewBox="0 0 1208 847" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,Segoe UI,sans-serif">
  <title>Fourth Meridian Provider Adapter Layer</title>
  <desc>ProviderCatalog lets the user pick an institution (Chase, Amex, Schwab, Coinbase, CSV, etc.) from Fourth Meridian's own UI, which routes to one of four provider shapes (aggregator, exchange, brokerage, import). Each shape implements the same ProviderAdapter interface and writes its own shape-specific detail table (AggregatorConnectionDetail, ExchangeConnectionDetail, BrokerageConnectionDetail, ImportConnectionDetail), converging on one shared Connection row per user/provider/institution and feeding the DiscoveredAccount staging queue.</desc>
  <defs>
    <marker id="arrow-bold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4A4944"/>
    </marker>
    <marker id="arrow-thin" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9C9A92"/>
    </marker>
    <marker id="arrow-deny" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A32D2D"/>
    </marker>
    </defs>
  <rect x="0" y="0" width="1208" height="847" fill="#FBFAF8"/>
  <text x="50.0" y="36.0" font-size="19" font-weight="700" text-anchor="start" fill="#23231F" font-family="-apple-system,Segoe UI,sans-serif"  style="">Fourth Meridian — Provider Adapter Layer</text>
  <text x="50.0" y="60.0" font-size="11.5" font-weight="400" text-anchor="start" fill="#73726C" font-family="-apple-system,Segoe UI,sans-serif"  style="">Every provider, regardless of shape, implements the same ProviderAdapter interface — downstream code only ever sees the canonical DTO it returns.</text>
